<script type="text/javascript">

  var asked = false;
  var i = 0;
  var questions  = new Array();
  var answers    = new Array();
      questions[i] = "Where does the word March come from?";
      answers[i]   = "It originally came from the word Martius, which " +
                     "came from the first month of the Roman Calendar, Mars " +
					 "which is also the god of war.";
      i++;

      questions[i] = "What movie grossed over 1 Billion dollars in 1998?";
      answers[i]   = "Titanic starring Leonardo Dicaprio and Kate Winslet.";
      i++;

      questions[i] = "What popular board game was created and trademarked in 1933?";
      answers[i]   = "It was Monopoly&trade;!  ";           
      i++;

      questions[i] = "What has four eyes but can't see anything?";
      answers[i]   = "The Mississippi.";
      i++;
	  
	  questions[i] = "What has hands but can't clap?";
      answers[i]   = "A clock.";
      i++;
	  
	  questions[i] = "What can you catch but can not throw?";
      answers[i]   = "A cold.";
      i++;
	  
  var currentQuestion = questions.length-1;

  function askQuestion() {
    currentQuestion = (currentQuestion + 1) % questions.length;
    var tmp = document.getElementById('answer');
        tmp.style.visibility = 'hidden';
        tmp.innerHTML = ""
        tmp = document.getElementById('question');
        tmp.style.visibility = 'visible';
        tmp.innerHTML = questions[currentQuestion];
        asked = true;
  }
  function showAnswer() {
    if (asked) {
       var tmp = document.getElementById('answer');
           tmp.style.visibility = 'visible';
           tmp.innerHTML = answers[currentQuestion];
    }
    asked = false;
  }

// Close the dropdown menu if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {

    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
