		<script>
			/* When the user clicks on the button,

			/* Close the dropdown menu if the user clicks outside of it */
			window.oncllick = function(event) {
				if (!event.target.matches('.droptbtn')) {
					
					var dropdowns = document.getElementByClassName ("dropdown-content");
					var i;
					for (i = 0; i < dropdowns.length; i++) {
						var openDropdown = dropdowns [i];
						if (openDropdown.classList.contains('show')) {
							openDropdown.classList.remove('show');
						}
					}
				}
			}

		<script type="text/javascript">
			function removeChildren(wherefrom) {
			var parent = document.getElementById(wherefrom);
				if (parent) {
					while (parent.hasChildNodes())
					parent.removeChild(parent.lastChild);
				}
			}
			var aircraft = null;
			function Aircraft(name, year, specs, picture) {
				this.name = name;
				this.year = year;
				this.specs = specs;
				this.picture = picture;
			}
			function showAircraft(aircraft, whereso) {
			var craft = aircraft;
			var node = document.getElementById(whereso);

			if (node) {
				var data = '<h1>' + craft.name + '</h1>';
					data += '<h2>' + craft.year + '</h2>';
					data += '<ul type="disc">';

				for (var prop in craft.specs) {
					var property = prop;
					var property_value = craft.specs[prop];
					if (property) property += ':';
					// var item = "<li> <b>" + property + ":</b> " + property_value;
					var item = "<li> <b>" + property + "</b> " + property_value;
					data +=  item;
				}
				data += "</ul>";
				var img = '<p><img src="' + craft.picture +
						  '" width="200" height="165" border="0"' +
						  ' /></p>';
				data += img;
				node.innerHTML = data;
			}
		}
		function hideAircraft1() {
			var nodes = document.getElementsByTagName('input');
			for (var n in nodes) {

					nodes[n].value = 'Step1';
					nodes[n].onclick = showAircraft1;
					break;
				}
			}
			removeChildren('now');
