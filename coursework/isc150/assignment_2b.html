	<script type="text/javascript">
		function sumDivFromA2B (a, b, n) {
			var accumulator = 0;
			var start = parseInt(a);
			if (start % parseInt(n) != 0) start++;
			var stop = parseInt(b);
			for (var i = start; i <=stop; i++) {
					if (i%parseInt(n) ==0)
					accumulator += i;
				}
			return accumulator;
		}

			<h2>Sum the numbers <i>divisible by N</i> from <tt>A</tt> to <tt>B</tt></h2>
				</p>
		<div style="border:2px dashed green;background:#f5f5dc;">
			<form>
				A: <input type="text"
							id="A"
							name="A"
							size="10"
							value="2"
							onFocus="if (value == this.defaultValue) value = ''"
					/>
				&nbsp
				B: <input type="text"
							id="B"
							name="B"
							size="10"
							value="10"
							onFocus="if (value == this.defaultValue) value = ''"
					/>
				&nbsp
				N: <input type="text"
							id="n"
							name="n"
							size="10"
							value="2"
							onFocus="if (value == this.defaultValue) value = ''"
					/>
	<br>
				Accumulated sum:
					<input type="text"
							id="TOTAL"
							name="TOTAL"
							readonly
							size="20"
					/>
	<br>				
				<input type="button"
						value="Do Accumulation"
						onclick="this.form.TOTAL.value = sumDivFromA2B(this.form.A.value, this.form.B.value, this.form.n.value)"
