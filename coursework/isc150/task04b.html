			<script>
				/**
				 * Function: adds numbers until reaches M or more, starting at 'n'
				 * Returns: last number used in summing to M
				**/
				function oneHundredOrMoreFromN(n, m) {
					var accumulator = 0;
					var i = parseInt(n);
					while (accumulator < parseInt(m) ){
						accumulator += i;
						document.the_form.total.value = accumulator;
						i++;
						}
					return i-1;
				}

	<p>
	</p><h2>How many natural numbers, beginning at 'N', does it take to total M or more?</h2>
	<p></p>
		<div style="border:2px dashed green;background:#f5f5dc;">
			<form name="the_form">
				Starting Value (N):
					<input type="text" id="n" name="n" value="1" size="20"/>
	<br>
				Ending Value (M):
					<input type="text" id="m" name="m" value="100" size="20"/>
	<br> 
				Accumulated sum:
					<input type="text" id="total" name="total" value="0" readonly size="20"/>
	<br>
				Last number used:
					<input type="text" id="last" name="last" readonly size="10">
	<br>
				<input type="button" value="Tell me" onclick="this.form.last.value = oneHundredOrMoreFromN(this.form.n.value, this.form.m.value);">
