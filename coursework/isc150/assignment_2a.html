		<link rel="stylesheet" href="/style/stylesheet.css"/>
	<script type="text/javascript">
		function sumDivFromA2B (a, b) {
			var accumulator = 0;
			var start = parseInt(a);
			if (start % 5 != 0) start++;
			var stop = parseInt(b);
			for (var i = start; i <=stop; i++) {
					if (i%5 ==0)
					accumulator +=i;
				}
			return accumulator;
		}
	</script>

		<div style="border:2px dashed green;background:#f5f5dc; color:#161618;">

	<br>

						value="Do Accumulation"
