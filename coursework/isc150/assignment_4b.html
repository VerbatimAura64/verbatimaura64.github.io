<script type="text/javascript">

  var asked = false;
  var i = 0;
  var questions  = new Array();
  var answers    = new Array();
      questions[i] = "How can a pocket be empty but still have something in it?";
      answers[i]   = "It has a hole in it.";
      i++;

      questions[i] = "What word becomes shorter when you add letters to it?";
      answers[i]   = "Short. Add (er) and you get shorter.";
      i++;

      questions[i] = "What is tall when young and short when old?";
      answers[i]   = "A candle.";
      i++;

      questions[i] = "What happens once in a minute, twice in a moment, but never in a thousand years?";
      answers[i]   = "The letter m.";
      i++;

  var currentQuestion = questions.length-1;

  function askQuestion() {
    // currentQuestion = (currentQuestion + 1) % questions.length;
    currentQuestion = Math.floor(Math.random()*questions.length);
    var tmp = document.getElementById('answer');
        tmp.style.visibility = 'hidden';
        tmp.innerHTML = "";
        tmp = document.getElementById('question');
        tmp.style.visibility = 'visible';
        tmp.innerHTML = questions[currentQuestion];
    asked = true;
  }
  function showAnswer() {
    if (asked) {
      var tmp = document.getElementById('answer');
          tmp.style.visibility = 'visible';
          tmp.innerHTML = answers[currentQuestion];
    }
    asked = false;
  }
/* When the user clicks on the button,

// Close the dropdown menu if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {

    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
