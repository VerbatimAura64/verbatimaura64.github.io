	<script type="text/javascript">
		function sumDivFromA2B (a, b, n) {
			var accumulator = 0;
			var start = parseInt(a);
			if (start % parseInt(n) != 0) start++;
			var stop = parseInt(b);
			for (var i = start; i <=stop; i++) {
					if (i%parseInt(n) ==0)
					accumulator += i;
				}
			return accumulator;
		}
